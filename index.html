<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    *{ box-sizing:border-box; }

    body{
      margin:0;
      padding:42px 18px 56px;
      min-height:100vh;
      background:
        radial-gradient(circle at top, rgba(255,248,232,0.95), transparent 34%),
        linear-gradient(180deg, #efe3cc 0%, #f7f0e3 48%, #e8d6b8 100%);
      font-family:Georgia, serif;
      text-align:center;
      color:#3a2d1f;
    }

    .wrap{
      max-width:720px;
      margin:0 auto;
    }

    .intro{
      max-width:620px;
      margin:0 auto 24px;
      font-size:18px;
      line-height:1.55;
      opacity:0.84;
    }

    button{
      margin-top:16px;
      padding:20px 42px;
      border:none;
      border-radius:18px;
      background:#3a2d1f;
      color:white;
      font-size:24px;
      font-weight:bold;
      cursor:pointer;
      font-family:Georgia, serif;
      box-shadow:0 12px 28px rgba(58,45,31,0.18);
    }

    button:hover{ opacity:0.92; }

    button:disabled{
      opacity:0.65;
      cursor:not-allowed;
    }

    #card{
      margin-top:34px;
      padding:26px 18px 30px;
      border-radius:30px;
      background:rgba(255,255,255,0.28);
      box-shadow:0 18px 45px rgba(58,45,31,0.16);
      display:none;
    }

    #card img{
      width:320px;
      max-width:92%;
      border-radius:18px;
      box-shadow:0 8px 20px rgba(58,45,31,0.16);
      transition:transform 0.12s ease, opacity 0.12s ease;
    }

    .shuffle img{
      transform:scale(0.98);
      opacity:0.82;
    }

    h2{
      margin:22px 0 10px;
      font-size:28px;
      letter-spacing:0.04em;
    }

    .meaning{
      max-width:560px;
      margin:0 auto;
      font-size:18px;
      line-height:1.65;
      opacity:0.9;
    }

    .services{
      margin:32px auto 0;
      padding:24px 22px;
      max-width:600px;
      border-radius:24px;
      background:rgba(255,255,255,0.32);
      box-shadow:0 10px 28px rgba(58,45,31,0.10);
      text-align:left;
    }

    .services h3{
      margin:0 0 14px;
      text-align:center;
      font-size:22px;
    }

    .services h4{
      margin:18px 0 6px;
      font-size:18px;
    }

    .services p{
      margin:0;
      font-size:16px;
      line-height:1.55;
      opacity:0.86;
    }

    .services a{
      display:inline-block;
      margin-top:8px;
      color:#3a2d1f;
      font-weight:bold;
      text-decoration:underline;
    }

    .note{
      margin-top:20px;
      font-size:14px;
      opacity:0.68;
    }

    @media(max-width:480px){
      body{ padding:32px 12px 44px; }
      button{ font-size:21px; padding:18px 34px; }
      #card{ padding:20px 10px 26px; }
      h2{ font-size:25px; }
      .meaning{ font-size:17px; }
    }
  </style>
</head>

        const botao = document.getElementById("drawButton");
    const cardArea = document.getElementById("card");

    function hojeChave(){
      return new Date().toDateString();
    }

    function sortearCarta(){
      const hoje = hojeChave();
      const dataSalva = localStorage.getItem("dataCarta");
      const cartaSalva = localStorage.getItem("cartaDoDia");

      if(dataSalva === hoje && cartaSalva){
        mostrarCarta(JSON.parse(cartaSalva), false);
        return;
      }

      embaralhar();
    }

    function embaralhar(){
      botao.disabled = true;
      botao.innerText = "Embaralhando...";
      cardArea.style.display = "inline-block";
      cardArea.classList.add("shuffle");

      let trocas = 0;
      const totalTrocas = 24;

      const intervalo = setInterval(() => {
        const cartaAleatoria = cartas[Math.floor(Math.random() * cartas.length)];
        cardArea.innerHTML = `<img src="${cartaAleatoria.imagem}" alt="Carta embaralhando">`;
        trocas++;

        if(trocas >= totalTrocas){
          clearInterval(intervalo);

          const cartaFinal = cartas[Math.floor(Math.random() * cartas.length)];

          localStorage.setItem("cartaDoDia", JSON.stringify(cartaFinal));
          localStorage.setItem("dataCarta", hojeChave());

          setTimeout(() => mostrarCarta(cartaFinal, true), 250);
        }
      }, 95);
    }

    function mostrarCarta(carta, nova){
      cardArea.classList.remove("shuffle");
      cardArea.style.display = "inline-block";

      cardArea.innerHTML = `
        <img src="${carta.imagem}" alt="${carta.titulo}">
        <h2>${carta.titulo}</h2>
        <p class="meaning">${carta.significado}</p>

        <div class="services">

          <p>Para ansiedade, relacionamentos, autoconhecimento, desenvolvimento pessoal e questões emocionais.</p>
          <a href="https://onlineterapeuta.com.br" target="_blank" rel="noopener">onlineterapeuta.com.br</a>

          <h4>Leitura de Aura e Chakras</h4>
          <p>Uma análise do seu campo energético, padrões emocionais, bloqueios e situações da sua vida que podem estar influenciando sua jornada atual.</p>

          <h4>Leitura para Empresários e Empreendedores</h4>
          <p>Insights sobre padrões, decisões, desafios e oportunidades relacionados à vida profissional, carreira e negócios.</p>
          <a href="https://www.akashaprana.com" target="_blank" rel="noopener">akashaprana.com</a>
        </div>
      `;

      botao.disabled = false;
      botao.innerText = nova ? "Carta de hoje revelada" : "Carta de hoje";
    }
