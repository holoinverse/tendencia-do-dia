name: Daily OneSignal Notification

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  send-notification:
    runs-on: ubuntu-latest

    steps:
      - name: Send OneSignal Notification
        run: |
          curl --request POST \
          --url https://api.onesignal.com/notifications \
          --header "Authorization: Key ${{ secrets.ONESIGNAL_API_KEY }}" \
          --header "accept: application/json" \
          --header "content-type: application/json" \
          --data '{
            "app_id":"${{ secrets.ONESIGNAL_APP_ID }}",
            "included_segments":["Portuguese Users"],
            "headings":{"en":"Tendência do Dia","pt":"Tendência do Dia"},
            "contents":{"en":"Reserve um momento para descobrir a tendência do seu dia.","pt":"Reserve um momento para descobrir a tendência do seu dia."},
            "url":"https://holoinverse.github.io/tendencia-do-dia/",
            "delayed_option":"timezone",
            "delivery_time_of_day":"08:30"
          }'
